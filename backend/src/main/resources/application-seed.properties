# ================================================================
#  MediConnect - Seed Profile Configuration
#  Active when: spring.profiles.active=seed
#  Overrides the main application.properties for seeding only
# ================================================================

# No web server — seeder runs and exits cleanly
spring.main.web-application-type=none

# Do NOT alter table structure during seeding
spring.jpa.hibernate.ddl-auto=none

# Optional: reduce startup noise
logging.level.org.hibernate.SQL=warn
logging.level.org.springframework=warn
logging.level.com.cts.mfrp.seed=info
