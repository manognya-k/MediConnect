<div class="modal-overlay" (click)="cancel()">
  <div class="modal-card" (click)="$event.stopPropagation()">

    <div class="modal-header">
      <h2 class="modal-title">Request Lab Test</h2>
      <button class="modal-close" (click)="cancel()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
          <path d="M18 6L6 18M6 6l12 12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
      </button>
    </div>

    <form [formGroup]="form" (ngSubmit)="save()">
      <div class="form-body">

        <!-- Patient -->
        <div class="field">
          <label class="field-label">Patient <span class="req">*</span></label>
          <div class="autocomplete-wrap">
            <input
              class="field-input"
              [class.invalid]="patientError"
              type="text"
              placeholder="Search patient name…"
              [value]="patientQuery"
              (input)="onPatientInput($any($event.target).value)"
              (blur)="closeDropdown()"
              autocomplete="off">
            <div class="dropdown" *ngIf="showDropdown">
              <div class="dropdown-item"
                   *ngFor="let pt of filteredPatients"
                   (mousedown)="selectPatient(pt)">{{ pt.name }}</div>
            </div>
          </div>
          <span class="field-error" *ngIf="patientError">Patient is required</span>
        </div>

        <!-- Test Type -->
        <div class="field">
          <label class="field-label">Test Type <span class="req">*</span></label>
          <select class="field-input" [class.invalid]="isInvalid('testType')" formControlName="testType">
            <option value="" disabled>Select test type…</option>
            <option *ngFor="let t of TEST_TYPES" [value]="t">{{ t }}</option>
          </select>
          <span class="field-error" *ngIf="isInvalid('testType')">Test type is required</span>
        </div>

        <!-- Priority + Date (2 columns) -->
        <div class="field-row">
          <div class="field">
            <label class="field-label">Priority <span class="req">*</span></label>
            <select class="field-input" formControlName="priority">
              <option value="Routine">Routine</option>
              <option value="Urgent">Urgent</option>
              <option value="STAT">STAT</option>
            </select>
          </div>
          <div class="field">
            <label class="field-label">Requested Date <span class="req">*</span></label>
            <input class="field-input" [class.invalid]="isInvalid('requestedDate')"
                   type="date" formControlName="requestedDate" [min]="today">
            <span class="field-error" *ngIf="isInvalid('requestedDate')">Date is required</span>
          </div>
        </div>

        <!-- Notes -->
        <div class="field">
          <label class="field-label">Notes <span class="opt">(optional)</span></label>
          <textarea class="field-input field-textarea"
                    formControlName="notes"
                    placeholder="Additional notes or instructions…"
                    rows="3"></textarea>
          <div class="char-count" [class.char-warn]="notesLength > 270">
            {{ notesLength }} / {{ notesMax }}
          </div>
          <span class="field-error" *ngIf="isInvalid('notes')">Max 300 characters</span>
        </div>

      </div>

      <div class="modal-footer">
        <button type="button" class="btn btn-ghost" (click)="cancel()">Cancel</button>
        <button type="submit" class="btn btn-primary" [disabled]="saving">
          <svg *ngIf="saving" class="spinner" width="14" height="14" viewBox="0 0 24 24" fill="none">
            <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="3" stroke-dasharray="30 70"/>
          </svg>
          {{ saving ? 'Submitting…' : 'Submit Request' }}
        </button>
      </div>
    </form>

  </div>
</div>
