<div class="modal-overlay" (click)="cancel()">
  <div class="modal-card" (click)="$event.stopPropagation()">

    <div class="modal-header">
      <h2 class="modal-title">Schedule Session</h2>
      <button class="modal-close" (click)="cancel()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
          <path d="M18 6L6 18M6 6l12 12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
      </button>
    </div>

    <form [formGroup]="form" (ngSubmit)="save()">
      <div class="form-body">

        <!-- Patient -->
        <div class="field">
          <label class="field-label">Patient <span class="req">*</span></label>
          <div class="autocomplete-wrap">
            <input class="field-input" [class.invalid]="patientError"
                   type="text" placeholder="Search patient name…"
                   [value]="patientQuery"
                   (input)="onPatientInput($any($event.target).value)"
                   (blur)="closeDropdown()"
                   autocomplete="off">
            <div class="dropdown" *ngIf="showDropdown">
              <div class="dropdown-item" *ngFor="let pt of filteredPatients"
                   (mousedown)="selectPatient(pt)">{{ pt.name }}</div>
            </div>
          </div>
          <span class="field-error" *ngIf="patientError">Patient is required</span>
        </div>

        <!-- Date + Time row -->
        <div class="field-row">
          <div class="field">
            <label class="field-label">Date <span class="req">*</span></label>
            <input class="field-input" [class.invalid]="isInvalid('date')"
                   type="date" formControlName="date" [min]="today">
            <span class="field-error" *ngIf="isInvalid('date')">Date is required</span>
          </div>
          <div class="field">
            <label class="field-label">Time <span class="req">*</span></label>
            <input class="field-input" [class.invalid]="isInvalid('time')"
                   type="time" formControlName="time">
            <span class="field-error" *ngIf="isInvalid('time')">Time is required</span>
          </div>
        </div>

        <!-- Duration -->
        <div class="field">
          <label class="field-label">Estimated Duration <span class="req">*</span></label>
          <div class="input-suffix-wrap">
            <input class="field-input has-suffix" [class.invalid]="isInvalid('duration')"
                   type="number" formControlName="duration" min="5" max="180" step="5">
            <span class="input-suffix">minutes</span>
          </div>
          <span class="field-error" *ngIf="isInvalid('duration')">Enter duration between 5–180 minutes</span>
        </div>

        <!-- Reason -->
        <div class="field">
          <label class="field-label">Reason <span class="req">*</span></label>
          <input class="field-input" [class.invalid]="isInvalid('reason')"
                 type="text" placeholder="e.g. Hypertension follow-up"
                 formControlName="reason">
          <span class="field-error" *ngIf="isInvalid('reason')">Reason is required (min 3 characters)</span>
        </div>

        <!-- Notes -->
        <div class="field">
          <label class="field-label">Notes <span class="opt">(optional)</span></label>
          <textarea class="field-input field-textarea"
                    formControlName="notes"
                    placeholder="Additional notes…"
                    rows="3"></textarea>
          <div class="char-count" [class.char-warn]="notesLength > 450">
            {{ notesLength }} / 500
          </div>
          <span class="field-error" *ngIf="isInvalid('notes')">Max 500 characters</span>
        </div>

      </div>

      <div class="modal-footer">
        <button type="button" class="btn btn-ghost" (click)="cancel()">Cancel</button>
        <button type="submit" class="btn btn-primary" [disabled]="saving">
          <svg *ngIf="saving" class="spinner" width="14" height="14" viewBox="0 0 24 24" fill="none">
            <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="3" stroke-dasharray="30 70"/>
          </svg>
          {{ saving ? 'Scheduling…' : 'Schedule Session' }}
        </button>
      </div>
    </form>

  </div>
</div>
