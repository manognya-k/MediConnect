<div class="page-wrapper">
  <div class="login-container">

    <!-- Left: Image / Illustration Section -->
    <div class="image-section">
      <div class="image-content">
        <div class="medical-illustration">
          <div class="illustration-circle"></div>
          <div class="illustration-cross">
            <span class="cross-v"></span>
            <span class="cross-h"></span>
          </div>
          <div class="illustration-dots">
            <span></span><span></span><span></span>
            <span></span><span></span><span></span>
          </div>
        </div>
      </div>
      <div class="secure-badge">
        <div class="badge-icon">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
            <path d="M12 2L4 6v6c0 5.25 3.5 10.15 8 11.35C16.5 22.15 20 17.25 20 12V6l-8-4z" fill="#2563EB"/>
            <path d="M9 12l2 2 4-4" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <div class="badge-text">
          <span class="badge-title">Secure Login</span>
          <span class="badge-sub">Protected Healthcare Data</span>
        </div>
      </div>
    </div>

    <!-- Right: Form Section -->
    <div class="form-section">
      <div class="form-inner">
        <!-- Logo -->
        <div class="logo">
          <div class="logo-icon">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
              <path d="M12 21.593c-5.63-5.539-11-10.297-11-14.402 0-3.791 3.068-5.191 5.281-5.191 1.312 0 4.151.501 5.719 4.457 1.59-3.968 4.464-4.447 5.726-4.447 2.54 0 5.274 1.621 5.274 5.181 0 4.069-5.136 8.625-11 14.402z" fill="white"/>
            </svg>
          </div>
          <span class="logo-text">MediConnect</span>
        </div>

        <h1 class="welcome-title">Welcome Back</h1>
        <p class="welcome-sub">Sign in to access your healthcare account</p>

        <!-- Role Tabs -->
        <div class="tabs">
          <button
            class="tab-btn"
            [class.active]="activeTab === 'PATIENT'"
            (click)="setTab('PATIENT')"
            type="button">
            Patient Login
          </button>
          <button
            class="tab-btn"
            [class.active]="activeTab === 'DOCTOR'"
            (click)="setTab('DOCTOR')"
            type="button">
            Doctor Login
          </button>
          <button
            class="tab-btn"
            [class.active]="activeTab === 'ADMIN'"
            (click)="setTab('ADMIN')"
            type="button">
            Admin Login
          </button>
        </div>

        <!-- Error Message -->
        <div class="error-alert" *ngIf="errorMessage">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
            <circle cx="12" cy="12" r="10" stroke="#DC2626" stroke-width="2"/>
            <line x1="12" y1="8" x2="12" y2="12" stroke="#DC2626" stroke-width="2" stroke-linecap="round"/>
            <circle cx="12" cy="16" r="1" fill="#DC2626"/>
          </svg>
          {{ errorMessage }}
        </div>

        <!-- Login Form -->
        <form (ngSubmit)="onLogin()" #loginForm="ngForm">
          <div class="form-group">
            <label class="form-label">Email Address</label>
            <div class="input-wrapper">
              <span class="input-icon">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
                  <rect x="2" y="4" width="20" height="16" rx="2" stroke="#9CA3AF" stroke-width="2"/>
                  <path d="M2 8l10 6 10-6" stroke="#9CA3AF" stroke-width="2"/>
                </svg>
              </span>
              <input
                type="email"
                class="form-input"
                placeholder="Enter your email"
                [(ngModel)]="email"
                name="email"
                required
              />
            </div>
          </div>

          <div class="form-group">
            <label class="form-label">Password</label>
            <div class="input-wrapper">
              <span class="input-icon">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
                  <rect x="5" y="11" width="14" height="10" rx="2" stroke="#9CA3AF" stroke-width="2"/>
                  <path d="M8 11V7a4 4 0 018 0v4" stroke="#9CA3AF" stroke-width="2"/>
                </svg>
              </span>
              <input
                [type]="showPassword ? 'text' : 'password'"
                class="form-input"
                placeholder="Enter your password"
                [(ngModel)]="password"
                name="password"
                required
              />
              <button type="button" class="eye-btn" (click)="togglePassword()">
                <svg *ngIf="!showPassword" width="16" height="16" viewBox="0 0 24 24" fill="none">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" stroke="#9CA3AF" stroke-width="2"/>
                  <circle cx="12" cy="12" r="3" stroke="#9CA3AF" stroke-width="2"/>
                </svg>
                <svg *ngIf="showPassword" width="16" height="16" viewBox="0 0 24 24" fill="none">
                  <path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94" stroke="#9CA3AF" stroke-width="2" stroke-linecap="round"/>
                  <path d="M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19" stroke="#9CA3AF" stroke-width="2" stroke-linecap="round"/>
                  <line x1="1" y1="1" x2="23" y2="23" stroke="#9CA3AF" stroke-width="2" stroke-linecap="round"/>
                </svg>
              </button>
            </div>
            <div class="forgot-row">
              <a href="#" class="forgot-link">Forgot Password?</a>
            </div>
          </div>

          <button type="submit" class="btn-login" [disabled]="loading">
            <span *ngIf="!loading">Login &rarr;</span>
            <span *ngIf="loading" class="spinner"></span>
          </button>
        </form>

        <p class="register-text">
          Don't have an account?
          <a routerLink="/register" class="register-link">Register</a>
        </p>

        <div class="secure-footer">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none">
            <path d="M12 2L4 6v6c0 5.25 3.5 10.15 8 11.35C16.5 22.15 20 17.25 20 12V6l-8-4z" fill="#16A34A"/>
          </svg>
          <span>Your data is secure and encrypted</span>
        </div>
      </div>
    </div>

  </div>
</div>
