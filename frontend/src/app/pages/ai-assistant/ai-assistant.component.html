<div class="chat-shell">

  <!-- Chat Header -->
  <div class="chat-header">
    <div class="chat-header-left">
      <button class="hamburger" (click)="layout.toggle()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
          <path d="M3 12h18M3 6h18M3 18h18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
      </button>
      <div class="ch-icon">
        <svg width="18" height="18" viewBox="0 0 16 16" fill="none">
          <circle cx="8" cy="8" r="5.5" stroke="#185FA5" stroke-width="1.5"/>
          <path d="M6 6.5c0-1.1.9-2 2-2s2 .9 2 2c0 1-1 1.5-2 2v1" stroke="#185FA5" stroke-width="1.5" stroke-linecap="round"/>
          <circle cx="8" cy="12" r=".75" fill="#185FA5"/>
        </svg>
      </div>
      <div>
        <div class="ch-title">MediConnect AI Assistant</div>
        <div class="ch-sub">Powered by Claude · Medical context enabled</div>
      </div>
    </div>
    <div class="ch-badge">
      <div class="ch-badge-dot"></div>
      Online
    </div>
  </div>

  <!-- Messages Area -->
  <div class="messages" #messagesContainer>

    <div class="msg" [ngClass]="msg.role"
         *ngFor="let msg of messages; trackBy: trackByMessageId">
      <div class="msg-av" [ngClass]="msg.role">
        {{ msg.role === 'user' ? userInitials : 'AI' }}
      </div>
      <div class="msg-inner">
        <div class="msg-bubble"
             [class.error-bubble]="msg.isError"
             [innerHTML]="formatContent(msg.content)"></div>
        <div class="msg-time">{{ formatTime(msg.timestamp) }}</div>
      </div>
    </div>

    <!-- Typing indicator -->
    <div class="msg assistant" *ngIf="isTyping">
      <div class="msg-av assistant">AI</div>
      <div class="msg-inner">
        <div class="msg-bubble">
          <div class="typing">
            <span></span>
            <span></span>
            <span></span>
          </div>
        </div>
      </div>
    </div>

  </div>

  <!-- Suggestion Chips -->
  <div class="chip-row" *ngIf="chipsVisible">
    <button class="chip" *ngFor="let chip of chips" (click)="sendChip(chip)">
      {{ chip.label }}
    </button>
  </div>

  <!-- Input Bar -->
  <div class="input-bar">
    <textarea class="chat-input"
              [(ngModel)]="inputText"
              placeholder="Ask about patients, diagnoses, medications…"
              rows="1"
              (keydown)="onKeydown($event)"
              (input)="autoResize($any($event.target))"></textarea>
    <button class="send-btn" [disabled]="isLoading" (click)="sendMessage()">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
        <path d="M14 8L2 2l3 6-3 6 12-6z" fill="white"/>
      </svg>
    </button>
  </div>

  <div class="disclaimer">AI responses are for informational purposes only. Always apply clinical judgment.</div>

</div>
