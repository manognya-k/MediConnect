<div class="layout-wrap" [class.sb-closed]="!layout.sidebarOpen">
  <aside class="sb">
    <div class="sb-logo">
      <div class="sb-logo-icon">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
          <path d="M8 2v12M2 8h12" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
        </svg>
      </div>
      <span class="sb-logo-text">MediConnect</span>
    </div>

    <nav class="sb-nav">
      <a class="ni" routerLink="/doctor/dashboard" routerLinkActive="active">
        <svg viewBox="0 0 16 16" fill="none"><rect x="1" y="1" width="6" height="6" rx="1.5" fill="currentColor"/><rect x="9" y="1" width="6" height="6" rx="1.5" fill="currentColor"/><rect x="1" y="9" width="6" height="6" rx="1.5" fill="currentColor"/><rect x="9" y="9" width="6" height="6" rx="1.5" fill="currentColor"/></svg>
        Dashboard
      </a>
      <a class="ni" routerLink="/doctor/patients" routerLinkActive="active">
        <svg viewBox="0 0 16 16" fill="none"><circle cx="8" cy="5" r="3" stroke="currentColor" stroke-width="1.5"/><path d="M2 14c0-3.314 2.686-5 6-5s6 1.686 6 5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        Patients
      </a>
      <a class="ni" routerLink="/doctor/appointments" routerLinkActive="active">
        <svg viewBox="0 0 16 16" fill="none"><rect x="2" y="3" width="12" height="11" rx="1.5" stroke="currentColor" stroke-width="1.5"/><path d="M5 3V1.5M11 3V1.5M2 7h12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        Appointments
      </a>
      <a class="ni" routerLink="/doctor/lab-reports" routerLinkActive="active">
        <svg viewBox="0 0 16 16" fill="none"><path d="M6 2v5L3 13h10L10 7V2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><path d="M5.5 2h5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        Lab Reports
      </a>
      <a class="ni" routerLink="/doctor/medical-records" routerLinkActive="active">
        <svg viewBox="0 0 16 16" fill="none"><rect x="3" y="2" width="10" height="13" rx="1.5" stroke="currentColor" stroke-width="1.5"/><path d="M5 6h6M5 9h4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        Medical Records
      </a>
      <div class="nd"></div>
      <a class="ni" routerLink="/doctor/telemedicine" routerLinkActive="active">
        <svg viewBox="0 0 16 16" fill="none"><rect x="1" y="4" width="10" height="8" rx="1.5" stroke="currentColor" stroke-width="1.5"/><path d="M11 7l3-2v6l-3-2" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/></svg>
        Telemedicine
      </a>
      <a class="ni" routerLink="/doctor/analytics" routerLinkActive="active">
        <svg viewBox="0 0 16 16" fill="none"><path d="M2 14V6M6 14V4M10 14V8M14 14V2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        Analytics
      </a>
      <a class="ni" routerLink="/doctor/supply-chain" routerLinkActive="active">
        <svg viewBox="0 0 16 16" fill="none"><path d="M3 13V7l5-5 5 5v6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><rect x="6" y="9" width="4" height="4" rx="0.5" stroke="currentColor" stroke-width="1.5"/></svg>
        Supply Chain
      </a>
      <a class="ni" routerLink="/doctor/ai-assistant" routerLinkActive="active">
        <svg viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="5.5" stroke="currentColor" stroke-width="1.5"/><path d="M6 6.5c0-1.1.9-2 2-2s2 .9 2 2c0 1-1 1.5-2 2v1" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><circle cx="8" cy="12" r=".75" fill="currentColor"/></svg>
        AI Assistant
      </a>
    </nav>

    <div class="sb-foot">
      <div class="sb-av">{{ initials }}</div>
      <div>
        <div class="sb-name">{{ doctorName }}</div>
        <div class="sb-role">Cardiologist</div>
      </div>
    </div>
  </aside>

  <div class="layout-main">
    <router-outlet></router-outlet>
  </div>
</div>

<app-toast></app-toast>
