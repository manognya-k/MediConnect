<div class="layout-wrap" [class.sb-closed]="!layout.sidebarOpen">
  <aside class="sb">
    <div class="sb-logo">
      <div class="sb-logo-icon">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
          <path d="M8 2v12M2 8h12" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
        </svg>
      </div>
      <span class="sb-logo-text">MediConnect</span>
    </div>

    <nav class="sb-nav">
      <a class="ni" routerLink="/patient/dashboard" routerLinkActive="active">
        <svg viewBox="0 0 16 16" fill="none"><rect x="1" y="1" width="6" height="6" rx="1.5" fill="currentColor"/><rect x="9" y="1" width="6" height="6" rx="1.5" fill="currentColor"/><rect x="1" y="9" width="6" height="6" rx="1.5" fill="currentColor"/><rect x="9" y="9" width="6" height="6" rx="1.5" fill="currentColor"/></svg>
        Dashboard
      </a>
      <a class="ni" routerLink="/patient/appointments" routerLinkActive="active">
        <svg viewBox="0 0 16 16" fill="none"><rect x="2" y="3" width="12" height="11" rx="1.5" stroke="currentColor" stroke-width="1.5"/><path d="M5 3V1.5M11 3V1.5M2 7h12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        My Appointments
      </a>
      <a class="ni" routerLink="/patient/medical-records" routerLinkActive="active">
        <svg viewBox="0 0 16 16" fill="none"><rect x="3" y="2" width="10" height="13" rx="1.5" stroke="currentColor" stroke-width="1.5"/><path d="M5 6h6M5 9h4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        Medical Records
      </a>
      <a class="ni" routerLink="/patient/lab-reports" routerLinkActive="active">
        <svg viewBox="0 0 16 16" fill="none"><path d="M6 2v5L3 13h10L10 7V2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><path d="M5.5 2h5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        Lab Reports
      </a>
      <div class="nd"></div>
      <a class="ni" routerLink="/patient/profile" routerLinkActive="active">
        <svg viewBox="0 0 16 16" fill="none"><circle cx="8" cy="5" r="3" stroke="currentColor" stroke-width="1.5"/><path d="M2 14c0-3.314 2.686-5 6-5s6 1.686 6 5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        My Profile
      </a>
    </nav>

    <div class="sb-foot">
      <div class="sb-av">{{ initials }}</div>
      <div class="sb-foot-info">
        <div class="sb-name">{{ patientName }}</div>
        <div class="sb-role">Patient</div>
      </div>
      <button class="sb-logout" (click)="logout()" title="Logout">
        <svg viewBox="0 0 16 16" fill="none" width="14" height="14"><path d="M6 2H3a1 1 0 00-1 1v10a1 1 0 001 1h3M10 11l3-3-3-3M13 8H6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
    </div>
  </aside>

  <div class="layout-main">
    <router-outlet></router-outlet>
  </div>
</div>

<app-toast></app-toast>
